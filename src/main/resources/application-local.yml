spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mohe_db}
    username: ${DB_USERNAME:mohe_user}
    password: ${DB_PASSWORD:mohe_password}
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  batch:
    job:
      enabled: false

mohe:
  image:
    storage-path: ${IMAGE_STORAGE_PATH:./images}
    server-url: ${IMAGE_SERVER_URL:http://localhost:8080}
    use-remote: ${IMAGE_USE_REMOTE:false}
  image-processor:
    url: ${IMAGE_PROCESSOR_URL:http://100.99.236.50:5200}

crawler:
  base-url: ${CRAWLER_SERVER_URL:http://localhost:4000}

embedding:
  service:
    url: ${EMBEDDING_SERVICE_URL:http://localhost:2000}

oauth:
  kakao:
    client-id: ${OAUTH_KAKAO_CLIENT_ID:}
    client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}

batch:
  service:
    url: ${BATCH_SERVICE_URL:http://localhost:8081}
  collector:
    url: ${BATCH_COLLECTOR_URL:http://localhost:4001}
